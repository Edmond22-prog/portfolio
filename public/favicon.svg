<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <!-- Background Gradient (subtle glow) -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#140a33" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>

    <!-- Logo Primary Gradient (Cyan to Purple) -->
    <linearGradient id="primaryGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7b5ef8" />
      <stop offset="50%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#d8b4fe" />
    </linearGradient>

    <!-- Deep Glow Effect -->
    <filter id="deepGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Soft background glow -->
  <circle cx="200" cy="200" r="180" fill="url(#bgGlow)" />

  <!-- The Mark (Abstract EM) -->
  <g transform="translate(60, 80)" filter="url(#deepGlow)">
    
    <!-- Letter E (Left side, layered modern lines) -->
    <path d="M 60,30 
             L 60,210 
             L 120,210" 
          fill="none" 
          stroke="url(#primaryGradient)" 
          stroke-width="24" 
          stroke-linecap="square" 
          stroke-linejoin="miter" />
          
    <path d="M 60,120 L 100,120" 
          fill="none" 
          stroke="#a78bfa" 
          stroke-width="24" 
          stroke-linecap="square" />
          
    <path d="M 60,30 L 120,30" 
          fill="none" 
          stroke="#7b5ef8" 
          stroke-width="24" 
          stroke-linecap="square" />

    <!-- Letter M (Right side, formed by angled slash and verticals) -->
    <!-- It interlocks with E visually -->
    <path d="M 160,210 
             L 160,30 
             L 220,130 
             L 280,30 
             L 280,210" 
          fill="none" 
          stroke="url(#primaryGradient)" 
          stroke-width="24" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
          
    <!-- Decorative Tech Accents (Dots) -->
    <circle cx="20" cy="30" r="6" fill="#d8b4fe" />
    <circle cx="20" cy="210" r="6" fill="#7b5ef8" />
  </g>
</svg>
